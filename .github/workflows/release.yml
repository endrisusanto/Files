name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
          - os: windows-latest
            name: windows
          - os: macos-latest
            name: macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - run: npm install
      - run: npm run build
      - run: cargo build --manifest-path src-tauri/Cargo.toml --release

      - name: Pack binary
        shell: bash
        run: |
          mkdir -p release
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp src-tauri/target/release/cross-network-android-file-bridge.exe release/
          else
            cp src-tauri/target/release/cross-network-android-file-bridge release/
          fi
          cd release
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a ../android-file-bridge-${{ matrix.name }}.zip *
          else
            tar -czf ../android-file-bridge-${{ matrix.name }}.tar.gz *
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: android-file-bridge-${{ matrix.name }}
          path: android-file-bridge-*

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" artifacts/* --title "${GITHUB_REF_NAME}" --notes "Automated release ${GITHUB_REF_NAME}"
